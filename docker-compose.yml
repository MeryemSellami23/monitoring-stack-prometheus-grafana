version: '3.8'

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    environment:
      - GF_SMTP_ENABLED=true
      - GF_SMTP_HOST=smtp.gmail.com:587
      - GF_SMTP_USER=semeryem7@gmail.com
      - GF_SMTP_PASSWORD=vtbrmcriumpffqpf
      - GF_SMTP_FROM_ADDRESS=semeryem7@gmail.com
      - GF_SMTP_FROM_NAME=Grafana-Meryem
      - GF_SMTP_SKIP_VERIFY=true
    networks:
      - monitoring

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    ports:
      - "9100:9100"
    networks:      # <--- زيدي هادو ضروري
      - monitoring

  blackbox-exporter:
    image: prom/blackbox-exporter:latest
    container_name: blackbox-exporter
    ports:
      - "9115:9115"
    volumes:
      - ./blackbox.yml:/etc/blackbox_exporter/config.yml
    networks:      # <--- زيدي هادو ضروري
      - monitoring
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:      # <--- زيدي هادو ضروري
      - monitoring
  loki:
    image: grafana/loki:2.9.0
    container_name: loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - monitoring

  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    volumes:
      - /var/log:/var/log:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro  # لقراءة لوغات Docker أوتوماتيكياً
      - ./promtail-config.yml:/etc/promtail/config.yml
    user: root
    privileged: true
    command: -config.file=/etc/promtail/config.yml
    networks:
      - monitoring  # <--- Zidi hada bach i-chouf Loki

networks:
  monitoring:
    driver: bridge
